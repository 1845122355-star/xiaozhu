name: Build and publish handbook

on:
  push:
    branches: [ 'v1.0' ]
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: ls -la || true

      - name: Show docs tree (debug)
        run: ls -la docs || true && ls -la docs/deliverables || true

      - name: (If logo present) copy logo to working dir
        run: |
          if [ -f "docs/deliverables/logo.png" ]; then
            cp docs/deliverables/logo.png .
          fi

      - name: Install dependencies (pandoc + xelatex + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-lang-chinese \
            fonts-noto-cjk \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            fonts-lmodern \
            texlive-latex-extra
          sudo fc-cache -f -v || true
          fc-list | grep -i "noto\|lmodern" || true

      - name: Create output directory
        run: mkdir -p dist

      - name: Build DOCX
        id: build_docx
        run: |
          pandoc "docs/deliverables/广西发改委新干部手册_2026.md" -s -o "dist/广西发改委新干部手册（2026版）.docx" --toc --toc-depth=3 --resource-path=.:docs/deliverables

      - name: Build PDF (tolerate failure)
        id: build_pdf
        continue-on-error: true
        run: |
          pandoc "docs/deliverables/广西发改委新干部手册_2026.md" -s -o "dist/广西发改委新干部手册（2026版）.final.pdf" --pdf-engine=xelatex --toc --toc-depth=3 --resource-path=.:docs/deliverables

      - name: List dist (debug)
        run: ls -la dist || true

      - name: Check artifacts exist
        id: check_artifacts
        run: |
          if [ -f "dist/广西发改委新干部手册（2026版）.docx" ]; then echo "docx_exists=true" >> "$GITHUB_OUTPUT"; else echo "docx_exists=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f "dist/广西发改委新干部手册（2026版）.final.pdf" ]; then echo "pdf_exists=true" >> "$GITHUB_OUTPUT"; else echo "pdf_exists=false" >> "$GITHUB_OUTPUT"; fi

      - name: Create Release v1.0
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v1.0
          release_name: 广西发改委新干部工作手册（2026版） v1.0
          body: |
            自动构建并发布：广西壮族自治区发展改革委新干部手册（2026版）。
            交付物：.docx（可编辑）与 .final.pdf（印刷用，若生成成功）。
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DOCX asset (if exists)
        if: steps.check_artifacts.outputs.docx_exists == 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/广西发改委新干部手册（2026版）.docx
          asset_name: 广西发改委新干部手册（2026版）.docx
          asset_content_type: application/vnd.openxmlformats-officedocument.wordprocessingml.document

      - name: Upload PDF asset (if exists)
        if: steps.check_artifacts.outputs.pdf_exists == 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/广西发改委新干部手册（2026版）.final.pdf
          asset_name: 广西发改委新干部手册（2026版）.final.pdf
          asset_content_type: application/pdf
