name: Build and publish handbook

on:
  push:
    branches: [ 'v1.0' ]
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: ls -la || true

      - name: Show docs tree (debug)
        run: ls -la docs || true && ls -la docs/deliverables || true

      - name: (If logo present) copy logo to working dir
        run: |
          if [ -f "docs/deliverables/logo.png" ]; then
            cp docs/deliverables/logo.png .
          fi

      - name: Install dependencies (pandoc + xelatex + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-lang-chinese \
            fonts-noto-cjk \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            fonts-lmodern \
            texlive-latex-extra
          sudo fc-cache -f -v || true
          fc-list | grep -i "noto\|lmodern" || true

      - name: Create output directory
        run: mkdir -p dist

      - name: Build DOCX
        id: build_docx
        run: |
          pandoc "docs/deliverables/广西发改委新干部手册_2026.md" -s -o "dist/广西发改委新干部手册（2026版）.docx" --toc --toc-depth=3 --resource-path=.:docs/deliverables

      - name: Build PDF (tolerate failure)
        id: build_pdf
        continue-on-error: true
        run: |
          pandoc "docs/deliverables/广西发改委新干部手册_2026.md" -s -o "dist/广西发改委新干部手册（2026版）.final.pdf" --pdf-engine=xelatex --toc --toc-depth=3 --resource-path=.:docs/deliverables

      - name: List dist (debug)
        run: ls -la dist || true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0
          name: "广西发改委新干部工作手册（2026版） v1.0"
          files: dist/*

      - name: Done - show release url (debug)
        run: echo "Release should be created and assets uploaded (if present). Check Releases page."
